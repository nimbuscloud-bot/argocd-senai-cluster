apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: web-app-route
  namespace: grupo-teste
  labels:
    gateway: my-gateway
spec:
  parentRefs:
    - name: cluster-gateway-gateway # Nome do seu Gateway existente
      namespace: envoy-gateway-system
  hostnames:
    - "grupo-teste.internal"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: web-app-service
          port: 3000