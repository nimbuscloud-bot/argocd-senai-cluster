apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgadmin
  namespace: phrl0-page-ioturn-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgadmin
  template:
    metadata:
      labels:
        app: pgadmin
    spec:
      containers:
        - name: pgadmin
          image: dpage/pgadmin4
          env:
            - name: PGADMIN_DEFAULT_EMAIL
              value: admin@admin.com
            - name: PGADMIN_DEFAULT_PASSWORD
              value: admin
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: pgadmin-service
  namespace: phrl0-page-ioturn-demo
spec:
  selector:
    app: pgadmin
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pgadmin-route
  namespace: phrl0-page-ioturn-demo
spec:
  parentRefs:
    - name: cluster-gateway-gateway
      namespace: envoy-gateway-system
  hostnames:
    - pgadmin.phrl0-page-ioturn-demo.pgadmin
  rules:
    - backendRefs:
        - name: pgadmin-service
          port: 80
