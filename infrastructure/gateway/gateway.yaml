apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: cluster-gateway-gateway
  namespace: envoy-gateway-system   # ← namespace do Envoy Gateway
spec:
  gatewayClassName: eg              # ← referencia a GatewayClass acima
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: Selector
        selector:
          matchLabels:
            nimbus/allowed: "true"   # ← isso não muda
   - name: https
    protocol: HTTPS
    port: 443
    tls:
      mode: Terminate
      certificateRefs:
      - name: cluster-gateway-tls   # secret no mesmo namespace do Gateway
        namespace: envoy-gateway-system
    allowedRoutes:
      namespaces:
        from: Selector
        selector:
          matchLabels:
            nimbus/allowed: "true"   # mesma regra que o HTTP
