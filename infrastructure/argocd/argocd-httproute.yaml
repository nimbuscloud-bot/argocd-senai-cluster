apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-route
  namespace: argocd
spec:
  parentRefs:
  - name: cluster-gateway-gateway
    namespace: envoy-gateway-system
  hostnames:
    - "argocd-prod.nscloud.io"
  rules:
  - backendRefs:
    - name: argocd-server
      port: 80
