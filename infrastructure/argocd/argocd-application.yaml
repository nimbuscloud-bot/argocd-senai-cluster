apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-master
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/PhrL0/argocd-senai-cluster.git'
    targetRevision: HEAD
    path: ../.. # APONTA PARA A RAIZ ONDE ESTÁ O KUSTOMIZATION MESTRE
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd 
  syncPolicy:
    automated:
      prune: true
      selfHeal: true